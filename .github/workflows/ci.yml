name: CI/CD Koi  # Nombre visible en GitHub

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]  # Trigger en tags como v0.1.0
  pull_request:
    branches: [ main ]

permissions:
  contents: read  # Seguridad básica

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        virtualenvs-create: true
        virtualenvs-in-project: true
    
    - name: Install dependencies
      run: poetry install --no-interaction
    
    - name: Run tests (pytest si tienes)
      run: poetry run pytest tests/  # Adapta a tu estructura
    
    - name: Lint (ruff o black)
      run: poetry run ruff check .  # Instala ruff en pyproject.toml

  docker:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show files
        run: |
          pwd
          ls -la
          find . -maxdepth 2 \( -name "Dockerfile" -o -name ".dockerignore" \) -print

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            tuusuario/koi:${{ github.ref_name }}
            tuusuario/koi:latest
    

  release:  # Opcional: PyPI en tags
    needs: docker
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/checkout@v4
    # + build wheel y twine upload (añade secrets PYPI_TOKEN)